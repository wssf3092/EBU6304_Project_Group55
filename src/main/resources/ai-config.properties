# OpenAI-compatible Chat Completions API (Step 10).
#
# Load order: this file, then optional classpath ai-config.local.properties (gitignored),
# then Java system properties (ai.*), then environment variables (TA_AI_*).
#
# Keys:
# - ai.baseUrl / TA_AI_BASE_URL
# - ai.apiKey / TA_AI_API_KEY
# - ai.model / TA_AI_MODEL
# - ai.timeoutMillis / TA_AI_TIMEOUT_MILLIS
# - ai.cacheMinutes / TA_AI_CACHE_MINUTES
#
# Disk cache for AI JSON lives under data/ai_cache/ (see AppPaths.aiCache()).
# Keep production keys out of committed files; use ai-config.local.properties locally.
ai.baseUrl=https://api.deepseek.com
ai.apiKey=
ai.model=deepseek-chat
ai.timeoutMillis=15000
ai.cacheMinutes=60
